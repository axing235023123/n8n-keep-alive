name: n8n Keep Alive Pro

on:
  schedule:
    # 每小时的第 0 分钟执行
    - cron: '0 * * * *'
  workflow_dispatch: # 保持手动触发功能

jobs:
  ping_space:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Up Space
        run: |
          # 1. 访问 API 接口 (唤醒管理层)
          curl -s -X GET "https://huggingface.co/api/spaces/xiu-xing/n8n-free" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" > /dev/null

          # 2. 访问 App 地址 (直接进入容器内部)
          # -L 是关键，用于追踪私有空间的重定向
          curl -s -L -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            https://xiu-xing-n8n-free.hf.space > /dev/null

          echo "All signals sent successfully at $(date)"
