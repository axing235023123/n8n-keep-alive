name: n8n Keep Alive Pro

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# 必须声明此权限，否则 GitHub Action 没有权限把代码 push 回你的仓库
permissions:
  contents: write

jobs:
  ping_spaces:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - space_path: "Xiu-xing/chatwoot"
            subdomain: "xiu-xing-chatwoot"
            token_name: "HF_TOKEN"     # 指定使用第一个 Token
          - space_path: "Houaxing/n8n-free"
            subdomain: "houaxing-n8n-free"
            token_name: "HF_TOKEN_1"   # 指定使用第二个 Token

    steps:
      - name: Wake Up Space (${{ matrix.space_path }})
        env:
          # 这一步是关键：根据 matrix 定义的名字，动态获取对应的 Secret
          # 逻辑是：如果 token_name 是 HF_TOKEN 就用 secrets.HF_TOKEN，否则用 secrets.HF_TOKEN_1
          CURRENT_TOKEN: ${{ matrix.token_name == 'HF_TOKEN' && secrets.HF_TOKEN || secrets.HF_TOKEN_1 }}
        run: |
          # 1. 访问 API 接口
          curl -s -X GET "https://huggingface.co/api/spaces/${{ matrix.space_path }}" \
            -H "Authorization: Bearer $CURRENT_TOKEN" > /dev/null

          # 2. 访问 App 地址
          curl -s -L -H "Authorization: Bearer $CURRENT_TOKEN" \
            "https://${{ matrix.subdomain }}.hf.space" > /dev/null

          echo "Signal sent to ${{ matrix.space_path }} using ${{ matrix.token_name }} at $(date)"

  keep_repo_active:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Keep repository active
        run: |
          # $(date +%u) 获取星期几（7 代表周日）。
          # 只有在【每周日】或者【手动触发 (workflow_dispatch)】时，才执行自动提交。
          # 这样既能完美避开 60 天禁用限制，又不会让 Commit 记录里全都是垃圾信息。
          if [ "$(date +%u)" = "7" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            echo "Last active update: $(date)" > keep_alive_status.txt
            git add keep_alive_status.txt
            git commit -m "chore: keep alive repository" || exit 0
            git push
          else
            echo "Today is not Sunday, skip commit to keep git history clean."
          fi
