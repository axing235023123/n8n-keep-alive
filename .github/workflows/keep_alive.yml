name: n8n Keep Alive

on:
  schedule:
    # 这里的 cron 表达式代表每小时执行一次（第 0 分钟触发）
    - cron: '0 * * * *'
  workflow_dispatch: # 允许你手动点击运行测试

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up n8n on Hugging Face
        run: |
          # 请将下方的链接替换为你真实的 n8n 访问地址
          curl -s https://xiu-xing-n8n-free.hf.space > /dev/null
          echo "Wake up call sent at $(date)"
